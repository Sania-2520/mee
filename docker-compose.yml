version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: meetingmind_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
      POSTGRES_DB: meetingmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: meetingmind_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: meetingmind_api
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespw@db:5432/meetingmind
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=super_secret_docker_key
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meetingmind_worker
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespw@db:5432/meetingmind
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: celery -A celery_worker.celery_app worker --loglevel=info
    restart: unless-stopped

volumes:
  postgres_data:
